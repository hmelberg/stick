<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>stick — a stick-figure animation language</title>
<style>
  :root {
    --chrome: #14151a;
    --panel: #1d1f26;
    --panel2: #23262f;
    --text: #d6d3cb;
    --dim: #8a8a93;
    --accent: #e8b84b;
    --ink: #2a2a35;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--chrome);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    gap: 14px;
    padding: 14px;
  }
  /* left: editor panel */
  #left {
    width: 400px; min-width: 300px;
    display: flex; flex-direction: column; gap: 10px;
  }
  h1 {
    font-size: 20px; margin: 0; font-weight: 600; letter-spacing: 0.5px;
    font-family: Georgia, serif;
  }
  h1 .tag { color: var(--dim); font-size: 12px; font-style: italic; margin-left: 8px; font-family: 'Segoe UI', sans-serif; }
  .row { display: flex; gap: 8px; align-items: center; }
  select, button, input[type=range] {
    background: var(--panel2); color: var(--text);
    border: 1px solid #32353f; border-radius: 6px;
    padding: 6px 10px; font-size: 13px;
  }
  select { flex: 1; }
  button { cursor: pointer; }
  button:hover { border-color: var(--accent); }
  #btnRender { background: var(--accent); color: #1a1408; font-weight: 600; border: none; }
  #btnRender:hover { filter: brightness(1.08); }
  #ed {
    flex: 1; resize: none; width: 100%;
    background: var(--panel); color: #cfd8c8;
    border: 1px solid #2c2f38; border-radius: 8px;
    font-family: Consolas, 'Cascadia Code', monospace; font-size: 12px;
    padding: 10px; line-height: 1.45;
    white-space: pre; tab-size: 2;
  }
  #ed:focus { outline: 1px solid #4a4534; }
  .warnings {
    max-height: 110px; overflow-y: auto;
    background: var(--panel); border: 1px solid #2c2f38; border-radius: 8px;
    padding: 8px 10px; font-size: 12px; line-height: 1.5; color: #d9b96a;
  }
  .warnings .ok { color: #7da87d; }
  .warnings.error { color: #e07a6a; }
  .hint { color: var(--dim); font-size: 11px; }
  /* right: stage */
  #right { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
  #stageWrap {
    flex: 1; display: flex; align-items: center; justify-content: center;
    background: #101116; border-radius: 10px; min-height: 0;
  }
  #stage {
    height: 100%; max-height: 100%; max-width: 100%; aspect-ratio: 1;
    border-radius: 8px; box-shadow: 0 8px 40px rgba(0,0,0,0.5);
  }
  #transport { display: flex; gap: 10px; align-items: center; padding: 2px 4px; }
  #btnPlay, #btnRestart { width: 42px; text-align: center; font-size: 14px; }
  #scrub { flex: 1; padding: 0; accent-color: var(--accent); }
  #timeLbl { font-variant-numeric: tabular-nums; color: var(--dim); font-size: 12px; min-width: 90px; text-align: right; }
  label.small { font-size: 12px; color: var(--dim); display: flex; align-items: center; gap: 4px; }
</style>
</head>
<body>
  <div id="left">
    <h1>stick<span class="tag">a stick-figure animation language</span></h1>
    <div class="row">
      <select id="selExample" title="examples"></select>
      <button id="btnRender" title="Ctrl+Enter">Render</button>
    </div>
    <textarea id="ed" spellcheck="false"></textarea>
    <div class="warnings" id="warnings"></div>
    <div class="hint">Ctrl+Enter renders · Space plays/pauses · see PROMPT.md for the LLM reference</div>
  </div>
  <div id="right">
    <div id="stageWrap">
      <svg id="stage" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div id="transport">
      <button id="btnPlay">▶</button>
      <button id="btnRestart">⟲</button>
      <input id="scrub" type="range" min="0" max="1000" value="0">
      <span id="timeLbl">0.0 / 0.0s</span>
      <label class="small"><input id="chkLoop" type="checkbox" checked> loop</label>
      <select id="selSpeed" style="flex:0">
        <option value="0.5">0.5×</option>
        <option value="1" selected>1×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
    </div>
  </div>
  <script src="js/presets.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/figure.js"></script>
  <script src="js/styles.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/commands.js"></script>
  <script src="js/examples.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
